<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Faed Platform — منصة فائض</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="/logo-dark.png" />
    <script>
      // Pick favicon on first paint: stored theme takes priority, then system preference
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var dark = stored
            ? stored !== 'light'
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var el = document.getElementById('dynamic-favicon');
          if (el) el.href = dark ? '/logo-dark.png' : '/logo-light.png';
        } catch (e) {}
      })();
    </script>
