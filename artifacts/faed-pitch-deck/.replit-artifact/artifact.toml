kind = "slides"
previewPath = "/faed-pitch-deck/"
title = "Faed Platform Pitch Deck"
version = "1.0.0"
id = "artifacts/faed-pitch-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
localPort = 19527
name = "web"
paths = ["/faed-pitch-deck/"]

[services.development]
run = "pnpm --filter @workspace/faed-pitch-deck run dev"

[services.env]
PORT = "19527"
BASE_PATH = "/faed-pitch-deck/"

[services.production]
build = ["pnpm", "--filter", "@workspace/faed-pitch-deck", "run", "build"]
publicDir = "artifacts/faed-pitch-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
